name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # version is read from package.json "packageManager" field

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Package DMG (${{ matrix.arch }})
        # 智能签名：repo Secrets 里配了 CSC_LINK 就走签名 + 公证；没配就强制
        # 通过 CLI flag 关闭 hardenedRuntime / identity / entitlements 输出未签名 DMG
        # （否则 electron-builder 会卡在 "/path not a file" 错误）。
        # 用户首次启动未签名 DMG 时需要右键 → 打开（README 已说明）。
        # 配置签名步骤见 docs/RELEASE_PROCESS.md
        run: |
          if [ -n "${CSC_LINK:-}" ]; then
            echo "🔐 Apple signing certificate detected — building signed + notarized DMG"
            pnpm exec electron-builder --mac dmg --${{ matrix.arch }} --publish never
          else
            echo "📦 No signing certificate configured — building unsigned DMG"
            echo "   Users will need to right-click → Open on first launch (one-time)"
            pnpm exec electron-builder --mac dmg --${{ matrix.arch }} \
              -c.mac.hardenedRuntime=false \
              -c.mac.gatekeeperAssess=false \
              -c.mac.identity=null \
              -c.mac.entitlements=null \
              -c.mac.entitlementsInherit=null \
              --publish never
          fi
        env:
          # 跳过自动证书发现（无 Apple Developer ID 时必须）
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # 代码签名 — 在 repo Settings → Secrets 添加以下值即可启用签名/公证
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization（公证）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovo-mac-${{ matrix.arch }}
          path: out/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist -name "*.dmg" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Extract release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Try to extract this version's section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$TAG" '
              $0 ~ "^## \\[" substr(tag, 2) "\\]" { flag=1; next }
              flag && /^## / { flag=0 }
              flag { print }
            ' CHANGELOG.md > release-notes.md
            if [ ! -s release-notes.md ]; then
              echo "See CHANGELOG.md for changes." > release-notes.md
            fi
          else
            echo "See CHANGELOG.md for changes." > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: Ovo ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          files: release-assets/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
