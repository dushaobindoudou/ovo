name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from package.json "packageManager" field

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Package DMG (${{ matrix.arch }})
        # C6 修复脚手架：当 repo Settings → Secrets 配置了 CSC_LINK 等就会启用代码签名 + 公证。
        # 没配置时 CSC_IDENTITY_AUTO_DISCOVERY=false 强制跳过签名，输出未签名 DMG（用户右键 → 打开 即可启动）。
        # 配置签名步骤见 docs/RELEASE_PROCESS.md
        run: pnpm exec electron-builder --mac dmg --${{ matrix.arch }} --publish never
        env:
          # 跳过自动证书发现（无 Apple Developer ID 时必须，否则 electron-builder 会卡在签名步骤）
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # 代码签名 — 在 repo Settings → Secrets 添加这些值即可启用
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization（公证）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovo-mac-${{ matrix.arch }}
          path: out/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist -name "*.dmg" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Extract release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Try to extract this version's section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$TAG" '
              $0 ~ "^## \\[" substr(tag, 2) "\\]" { flag=1; next }
              flag && /^## / { flag=0 }
              flag { print }
            ' CHANGELOG.md > release-notes.md
            if [ ! -s release-notes.md ]; then
              echo "See CHANGELOG.md for changes." > release-notes.md
            fi
          else
            echo "See CHANGELOG.md for changes." > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: Ovo ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          files: release-assets/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
