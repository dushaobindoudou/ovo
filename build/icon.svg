<!--
  ovo 视觉单一来源（设计参考）。
  实际运行图标由 electron/icon-renderer.ts 程序化绘制——这里的几何参数与之保持一致。
  如要修改图标设计：同步更新 icon-renderer.ts 中的 GEOM。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103d28"/>
      <stop offset="1" stop-color="#051c10"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="46%">
      <stop offset="0" stop-color="#3affa6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3affa6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eyeStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6fbed"/>
      <stop offset="1" stop-color="#bce4cf"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <!-- 中心柔光 -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#glow)"/>

  <!-- 左眼 -->
  <circle cx="30" cy="48" r="14" fill="none" stroke="url(#eyeStroke)" stroke-width="2.6"/>
  <circle cx="30" cy="48" r="4.76" fill="#2da96e"/>

  <!-- 右眼 -->
  <circle cx="70" cy="48" r="14" fill="none" stroke="url(#eyeStroke)" stroke-width="2.6"/>
  <circle cx="70" cy="48" r="4.76" fill="#2da96e"/>

  <!-- V 形嘴 -->
  <path d="M42 38 L50 58 L58 38" fill="none" stroke="#4ae39b" stroke-width="3.4"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
